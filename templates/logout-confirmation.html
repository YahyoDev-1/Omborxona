<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="{% static 'branding/logo.svg' %}">
    <title>Tizimdan Chiqish</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .delete-container {
            background-color: #fff;
            padding: 34px;
            border-radius: 14px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .delete-container h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 22px;
        }

        .button-group {
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            flex: 1;
            text-align: center;
        }

        .btn-cancel {
            background-color: #f1f5f9;
            color: #334155;
        }

        .btn-cancel:hover {
            background-color: #e2e8f0;
        }

        .btn-delete {
            background-color: #0f766e;
            color: white;
        }

        .btn-delete:hover {
            background-color: #0c5a54;
        }
    </style>

</head>
<body>
<div class="delete-container">
    <h2>Haqiqatdan ham tizimdan chiqmoqchimisiz ?</h2>

    <!-- Bosh sahifaga qaytarish -->
    <div class="button-group">
        <a href="{% url 'sections' %}" class="btn btn-cancel">
            Bekor qilish
        </a>

        <!-- POST so'rovi yuborish orqali chiqish -->
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-delete">Ha, chiqilsin...</button>
        </form>
    </div>
</div>
</body>
</html>
