{% extends 'base.html' %}

{% block content %}
<!-- Content Wrapper. Contains page content -->
<div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0"><span style="color: #00FFFF;">{{ client.name }}</span> mijozni o'chirilmoqda!</h1>
                </div><!-- /.col -->
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="{% url 'logout' %}">Tizimdan chiqish</a></li>
                    </ol>
                </div><!-- /.col -->
            </div><!-- /.row -->
        </div><!-- /.container-fluid -->
        <!-- /.content-header -->
        <div class="col-md-12">
            <form method="post" id="edit-client-form">
                {% csrf_token %}
                <!-- Modal footer -->
                <button type="submit" class="btn btn-danger">O'chirish</button>
                <a href="{% url 'clients' %}">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Bekor qilish</button>
                </a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
