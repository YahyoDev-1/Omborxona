{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{% static 'branding/logo.svg' %}">
  <title>Tizimga kirish | Omborxona CRM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top left, #ecfdf9 0%, #f8fafc 45%, #f1f5f9 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #1e293b;
    }

    .login-box {
      background-color: #fff;
      padding: 56px 65px;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.07);
      width: 100%;
      max-width: 460px;
      transition: all 0.3s ease;
    }

    .login-box:hover {
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
      transform: translateY(-2px);
    }

    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .login-logo img {
      width: 56px;
      height: 56px;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1e293b;
    }

    .login-box .subtitle {
      text-align: center;
      margin-bottom: 32px;
      font-size: 0.92rem;
      color: #64748b;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-weight: 500;
      font-size: 0.95rem;
      color: #444;
    }

    input {
      width: 100%;
      padding: 15px 16px; /* biroz kattaroq input */
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 1rem;
      transition: border-color 0.25s, box-shadow 0.25s;
      background-color: #fff;
    }

    input:focus {
      outline: none;
      border-color: #14b8a6;
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
    }

    button {
      background-color: #0f766e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px 0;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.25s ease, transform 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      background-color: #0c5a54;
      transform: translateY(-2px);
    }

    .extra-links {
      text-align: center;
      margin-top: 28px;
      font-size: 0.9rem;
      color: #555;
    }

    .extra-links a {
      color: #0f766e;
      text-decoration: none;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 550px) {
      .login-box {
        padding: 40px 30px;
        border-radius: 14px;
        max-width: 90%;
      }

      .login-box h2 {
        font-size: 1.5rem;
        margin-bottom: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-logo">
      <img src="{% static 'branding/logo.svg' %}" alt="Omborxona CRM">
    </div>
    <h2>Omborxona CRM</h2>
    <p class="subtitle">Tizimga kirish uchun login va parolingizni kiriting</p>
      {% if messages %}
        {% for message in messages %}
            <p style="color: #dc2626; text-align: center; font-size: 0.9rem; margin-bottom: 16px;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Login</label>
        <input type="text" id="username" name="username" placeholder="Foydalanuvchi nomi..." required>
      </div>

      <div class="form-group">
        <label for="password">Parol</label>
        <input type="password" id="password" name="password" placeholder="Parol..." required>
      </div>

      <button type="submit">Kirish</button>
    </form>
  </div>

</body>
</html>
